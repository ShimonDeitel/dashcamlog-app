name: DashCamFootageLog
options:
  bundleIdPrefix: com.shimondeitel.dashcamlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  DashCamFootageLog:
    type: application
    platform: iOS
    sources:
      - path: DashCamFootageLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dashcamlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: DashCamFootageLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DashCamFootageLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DashCamFootageLogTests
      - path: DashCamFootageLog.storekit
    dependencies:
      - target: DashCamFootageLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dashcamlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DashCamFootageLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DashCamFootageLogUITests
    dependencies:
      - target: DashCamFootageLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dashcamlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  DashCamFootageLog:
    build:
      targets:
        DashCamFootageLog: all
        DashCamFootageLogTests: [test]
        DashCamFootageLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: DashCamFootageLog.storekit
    test:
      config: Debug
      storeKitConfiguration: DashCamFootageLog.storekit
      targets:
        - DashCamFootageLogTests
        - DashCamFootageLogUITests
    archive:
      config: Release
